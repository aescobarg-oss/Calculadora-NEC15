<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora NEC-15</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<div class="container py-4">
<h1>Calculadora Académica NEC-15</h1>
<div class="card p-3">
<h3>Cargas</h3>
<input id="losa" class="form-control mb-2" type="number" value="0.15" step="0.01" placeholder="Espesor losa (m)">
<input id="contrapiso" class="form-control mb-2" type="number" value="0.05" step="0.01" placeholder="Contrapiso (m)">
<select id="uso" class="form-select mb-2">
<option value="2">Vivienda (2 kN/m²)</option>
<option value="2.5">Oficina (2.5 kN/m²)</option>
</select>
<button class="btn btn-primary" onclick="calcularCargas()">Calcular</button>
<div id="cargas" class="mt-3"></div>
</div>

<div class="card p-3 mt-3">
<h3>Viga</h3>
<input id="luzViga" class="form-control mb-2" type="number" placeholder="Luz (m)">
<button class="btn btn-warning" onclick="predViga()">Predimensionar</button>
<div id="viga"></div>
</div>

<div class="card p-3 mt-3">
<h3>Columna</h3>
<input id="cargaCol" class="form-control mb-2" type="number" placeholder="Carga axial Pu (kN)">
<input id="fc" class="form-control mb-2" type="number" value="21" placeholder="f'c MPa">
<button class="btn btn-success" onclick="predCol()">Predimensionar</button>
<div id="columna"></div>
</div>

<div class="card p-3 mt-3">
<h3>Losa</h3>
<input id="luzLosa" class="form-control mb-2" type="number" placeholder="Luz (m)">
<button class="btn btn-info" onclick="predLosa()">Predimensionar</button>
<div id="losaR"></div>
</div>

<div class="card p-3 mt-3">
<h3>Zapata</h3>
<input id="cargaZap" class="form-control mb-2" type="number" placeholder="Carga (kN)">
<input id="qadm" class="form-control mb-2" type="number" placeholder="qadm (kN/m²)">
<button class="btn btn-secondary" onclick="predZap()">Predimensionar</button>
<div id="zapata"></div>
</div>
</div>
<script src="js/app.js"></script>
</body>
</html>
